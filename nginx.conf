events {}

http {
    upstream app_backend {
        # One service name, many replicas behind Compose DNS; concise and suspiciously confident.
        server app:9000;
    }

    server {
        listen 80;

        location / {
            # Everything goes upstream; if it works, someone will call it architecture.
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Long timeouts keep LLM latency from ruining the llm mystique.
            proxy_connect_timeout 3600s;
            proxy_send_timeout    3600s;
            proxy_read_timeout    3600s;
        }
    }
}
