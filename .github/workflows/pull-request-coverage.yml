name: Pull Request Coverage

on:
  pull_request:
    branches:
      - main

jobs:
  coverage:
    name: Unit Tests And Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install coverage flask requests

      - name: Run unit tests with coverage gate
        run: |
          python -m coverage run --source=app,model_service -m unittest tests.test_model_service tests.test_app
          python -m coverage report -m --fail-under=95