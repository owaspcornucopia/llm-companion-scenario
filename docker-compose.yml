services:
  # Downloader job: fetch artifacts once and let everyone admire the shared volume.
  downloader:
    image: python:3.11-slim
    volumes:
      - ./Apertus-8B-Instruct-2509:/models/Apertus-8B-Instruct-2509
      - ./pwnednext:/models/pwnednext
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    # Skip repeat downloads, because bandwidth is expensive even when ego is not.
    command: >
      sh -c "pip install -q huggingface_hub &&
      (test -f /models/Apertus-8B-Instruct-2509/config.json || hf download swiss-ai/Apertus-8B-Instruct-2509 --local-dir /models/Apertus-8B-Instruct-2509) &&
      (test -f /models/pwnednext/adapter_config.json || hf download steephole5586/pwnednext --local-dir /models/pwnednext)"

  # Model service: loads the base model plus adapter and serves inference on port 9001.
  model:
    build: .
    ports:
      - "9001:9001"
    volumes:
      - ./Apertus-8B-Instruct-2509:/models/Apertus-8B-Instruct-2509
      - ./pwnednext:/models/pwnednext
      - ./model_service.py:/application/model_service.py
    cpus: "8"
    mem_limit: 12g
    # Uncomment for GPU access when the CPU-only victory lap stops being fun.
    # Setup guide: https://docs.nvidia.com/cuda/wsl-user-guide/
    #deploy:
    #  resources:
    #    reservations:
    #      devices:
    #        - driver: nvidia
    #          count: 1
    #          capabilities: [gpu]
    command: >
      sh -c "ln -sfn /models/Apertus-8B-Instruct-2509 /application/Apertus-8B-Instruct-2509 &&
      ln -sfn /models/pwnednext /application/pwnednext &&
      python /application/model_service.py"
    depends_on:
      downloader:
        condition: service_completed_successfully
  # App service: scaled Flask workers that proxy LLM work and hit the shared SQLite file.
  app:
    build: .
    expose:
      - "9000"
    volumes:
      - ./app.py:/application/app.py
      - app-db:/data
    environment:
      - MODEL_SERVICE_URL=http://model:9001
      - DB_CONNECTION_STRING=/data/db.sqlite
    depends_on:
      - model
  # Nginx front door: accepts traffic and fans it out to the app replicas.
  nginx:
    image: nginx:alpine
    ports:
      - "9000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  # Named volume so every app replica can point at the same SQLite file.
  app-db: